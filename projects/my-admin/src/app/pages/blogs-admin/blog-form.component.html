<div class="page-header">
  <div>
    <a routerLink="/blogs" class="back-link">&larr; Quay lại</a>
    <h2>{{ id() ? 'Sửa bài viết' : 'Thêm bài viết' }}</h2>
  </div>
</div>

@if (error()) {
  <div class="alert-error">{{ error() }}</div>
}

<form (ngSubmit)="submit()" class="form">
  <div class="field" [class.field--error]="titleError">
    <label>Tiêu đề <span class="required">*</span></label>
    <input type="text" [(ngModel)]="model.title" name="title" (ngModelChange)="onTitleChange()" placeholder="Nhập tiêu đề bài viết" />
    @if (titleError) {
      <span class="field-error">{{ titleError }}</span>
    }
  </div>
  <div class="field">
    <label>Slug</label>
    <input type="text" [(ngModel)]="model.slug" name="slug" placeholder="tu-dong-tao-tu-tieu-de" />
  </div>
  <div class="field">
    <label>Mô tả ngắn</label>
    <textarea [(ngModel)]="model.excerpt" name="excerpt" rows="2"></textarea>
  </div>
  <div class="field">
    <div class="field-header">
      <label>Nội dung</label>
      <button type="button" class="btn btn--ghost btn--sm" (click)="togglePreview()">
        {{ showPreview() ? 'Ẩn xem trước' : 'Xem trước' }}
      </button>
    </div>
    <textarea [(ngModel)]="model.content" name="content" rows="8"></textarea>
    @if (showPreview() && model.content) {
      <div class="content-preview" [innerHTML]="model.content"></div>
    }
  </div>
  <div class="row">
    <div class="field">
      <label>Ảnh bìa (URL)</label>
      <input type="text" [(ngModel)]="model.coverImage" name="coverImage" placeholder="https://..." />
      @if (model.coverImage) {
        <div class="cover-preview">
          <img [src]="model.coverImage" alt="" class="cover-preview__img" />
        </div>
      }
    </div>
    <div class="field">
      <label>Tác giả</label>
      <input type="text" [(ngModel)]="model.author" name="author" />
    </div>
  </div>
  <div class="check">
    <label><input type="checkbox" [(ngModel)]="model.published" name="published" /> Xuất bản</label>
  </div>
  <div class="actions">
    <button type="submit" class="btn btn--primary" [disabled]="loading()">
      @if (loading()) { Đang lưu... } @else { {{ id() ? 'Cập nhật' : 'Tạo' }} }
    </button>
    <a routerLink="/blogs" class="btn btn--outline">Hủy</a>
  </div>
</form>
